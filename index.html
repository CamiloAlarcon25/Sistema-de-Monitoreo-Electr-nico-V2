<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPS Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css"> <!-- Archivo CSS externo -->
</head>
<body>
    <div class="info-bar">
        <span>Lat: <span id="lat">---</span> | Lng: <span id="lng">---</span></span>
        <button onclick="guardarRecorrido()">Guardar</button>
        <button class="btn-clear" onclick="limpiarRecorrido()">Limpiar</button>
    </div>
    <div id="map"></div>
<div id="historial">
    <h3>Historial:</h3>
    <ul id="lista-recorridos"></ul>
    <!-- Agrega esto para ver datos en vivo -->
    <div id="status-vivo" style="font-weight:bold; color: #2c3e50;">
        Distancia: <span id="dist-val">0</span> km
    </div>
</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script> <!-- Archivo JS externo -->
</body>
</html>
