<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPS Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; }
        #info { padding: 10px; background: #333; color: white; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="info">GPS: <span id="lat">...</span>, <span id="lng">...</span></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-33.0388, -71.3799], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map); // Modo oscuro
        
        let marker = L.marker([0, 0]).addTo(map);
        let polyline = L.polyline([], {color: '#00d4ff', weight: 4}).addTo(map);

        async function actualizar() {
            try {
                const res = await fetch('http://192.168.1.11/coords'); // CAMBIA TU IP AQUÍ
                const data = await res.json();
                const pos = [parseFloat(data.lat), parseFloat(data.lng)];
                
                marker.setLatLng(pos);
                polyline.addLatLng(pos);
                map.panTo(pos);
                
                document.getElementById('lat').innerText = data.lat;
                document.getElementById('lng').innerText = data.lng;
            } catch (e) { console.error("Sin conexión"); }
        }
        setInterval(actualizar, 2000);
    </script>
</body>
</html>
