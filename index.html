<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPS Tracker Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
        #info { padding: 10px; background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-clear { background: #e74c3c; color: white; }
        .btn-save { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div id="info">
        <div>Lat: <span id="lat">---</span> | Lng: <span id="lng">---</span></div>
        <div class="btn-group">
            <button class="btn-save" onclick="guardarRecorrido()">Guardar</button>
            <button class="btn-clear" onclick="limpiarRecorrido()">Limpiar</button>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([-33.0388, -71.3799], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        let marker = L.marker([0, 0]).addTo(map);
        let startMarker = null; // Nuevo: Marcador de inicio
        let polyline = L.polyline([], {color: '#3498db', weight: 5}).addTo(map);

        // Cargar historial si existe
        const savedPath = JSON.parse(localStorage.getItem('recorrido')) || [];
        if(savedPath.length > 0) {
            polyline.setLatLngs(savedPath);
            map.fitBounds(polyline.getBounds());
        }

        async function actualizar() {
            try {
                const res = await fetch('http://TU_IP_ESP32/coords'); // CAMBIA TU IP
                const data = await res.json();
                const pos = [parseFloat(data.lat), parseFloat(data.lng)];
                
                // Si no hay marcador de inicio, ponemos uno
                if(!startMarker) {
                    startMarker = L.marker(pos).addTo(map).bindPopup("Inicio").openPopup();
                }
                
                marker.setLatLng(pos);
                polyline.addLatLng(pos);
                map.panTo(pos);
                document.getElementById('lat').innerText = data.lat;
                document.getElementById('lng').innerText = data.lng;
            } catch (e) {}
        }

        function limpiarRecorrido() {
            polyline.setLatLngs([]);
            if(startMarker) { map.removeLayer(startMarker); startMarker = null; }
            localStorage.removeItem('recorrido');
        }

        function guardarRecorrido() {
            localStorage.setItem('recorrido', JSON.stringify(polyline.getLatLngs()));
            alert("Recorrido guardado localmente");
        }

        setInterval(actualizar, 2000);
    </script>
</body>
</html>
